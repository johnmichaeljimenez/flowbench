<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flowbench</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-highlight/lib/index.umd.js"></script>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark-dimmed.min.css">
</head>

<body style="padding-top: 2rem;">
    <section class="section">
        <nav class="navbar has-shadow mb-4 is-fixed-top" role="navigation" aria-label="main navigation">
            <div class="navbar-brand">
                <span class="navbar-item has-text-weight-semibold">Flowbench</span>
            </div>
            <a href="#" id="loadGraph" class="navbar-item">
                <span class="icon"><i class="fas fa-folder-open"></i></span>
                <span>Select Graph</span>
            </a>
        </nav>

        <div class="container">
            <h1 class="title" id="graphName">Flowbench</h1>
            <h2 class="subtitle py-4" id="graphDescription">Load a graph to start</h2>
            <hr>
            <form id="graphForm" onsubmit="runGraph(event)"></form>
            <div id="responseOutput" class="px-4 py-4"></div>
        </div>
    </section>

    <div class="modal" id="graphModal">
        <div class="modal-background"></div>
        <div class="modal-card">
            <header class="modal-card-head">
                <p class="modal-card-title">Select a Graph</p>
                <button class="delete is-large" aria-label="close" id="closeModal"></button>
            </header>
            <section class="modal-card-body">
                <div class="field">
                    <div class="control has-icons-left">
                        <input id="graphSearch" class="input" type="text" placeholder="Search graphs...">
                        <span class="icon is-left"><i class="fas fa-search"></i></span>
                    </div>
                </div>

                <div id="graphList" class="menu"></div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
