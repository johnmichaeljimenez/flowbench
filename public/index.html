<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Flowbench JSON Processor</title>
</head>

<body>
    <h1>Flowbench JSON Processor</h1>

    <input type="file" id="jsonFile" accept=".json" />

    <form id="graphForm" onsubmit="runGraph(event)"> </form>
    <div id="responseOutput"></div>

    <script>
        const fileInput = document.getElementById('jsonFile');
        const responseOutput = document.getElementById('responseOutput');
        const graphForm = document.getElementById('graphForm');

        let workingData = null;

        function getParams(form) {
            const params = {};
            for (const element of form.elements) {
                if (!element.id) continue;

                let value;
                if (element.type === "checkbox") {
                    value = element.checked;
                } else if (element.type === "radio") {
                    if (!element.checked) continue;
                    value = element.value;
                } else if (element.tagName.toLowerCase() === "select") {
                    value = element.value;
                } else {
                    value = element.value;
                }
                params[element.id] = value;
            }
            return params;
        }

        function renderResults() {
            responseOutput.innerHTML = "";

            if (!workingData.results) return;

            workingData.results.forEach((element, index) => {
                if (element.type === "text") {
                    const container = document.createElement("div");
                    container.innerText = element.name ?? "";

                    const copyBtn = document.createElement("button");
                    copyBtn.innerText = "Copy";
                    
                    copyBtn.onclick = () => navigator.clipboard.writeText(workingData.results[index].value ?? "");
                    container.appendChild(copyBtn);

                    container.appendChild(document.createElement("hr"));
                    const txt = document.createElement("p");
                    txt.innerText = element.value ?? "<EMPTY>";
                    container.appendChild(txt);

                    responseOutput.appendChild(container);
                }
            });
        }

        fileInput.addEventListener('change', async () => {
            const file = fileInput.files[0];
            if (!file) return;

            try {
                const text = await file.text();
                workingData = JSON.parse(text); 
                workingData.results = [];     

                const response = await fetch('/form', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(workingData)
                });

                const formHTML = await response.text();
                graphForm.innerHTML = formHTML;
                responseOutput.textContent = ""; 
            } catch (err) {
                responseOutput.textContent = "Error: " + err.message;
                workingData = null;
            }
        });

        async function runGraph(event) {
            event.preventDefault();

            if (!workingData) {
                alert("Please select a JSON file first.");
                return;
            }

            try {
                workingData.params = getParams(graphForm);

                const response = await fetch('/process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(workingData)
                });

                const result = await response.json();
                workingData.results = result;

                renderResults();

            } catch (err) {
                responseOutput.textContent = "Error: " + err.message;
            }
        }
    </script>
</body>

</html>
