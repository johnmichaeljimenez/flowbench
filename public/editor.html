<!DOCTYPE html>
<html lang="en" class="has-navbar-fixed-top">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Flowbench | Editor</title>

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

	<style>
		html,
		body {
			height: 100%;
			margin: 0;
			overflow: hidden;
		}

		.main-content {
			height: 100vh;
			display: flex;
			flex-direction: column;
			padding-top: 1rem;
		}

		.editor-wrapper {
			flex: 1;
			min-height: 0;
			padding: 0 1.5rem 1.5rem;
		}

		.split-container {
			display: flex;
			height: 100%;
			gap: 1rem;
		}

		.monaco-part {
			flex: 4;
			min-width: 0;
			display: flex;
			flex-direction: column;
		}

		.panel-part {
			flex: 1;
			min-width: 0;
			display: flex;
			flex-direction: column;
		}

		#editor {
			flex: 1;
			width: 100%;
			height: 100%;
			border-radius: 8px;
			overflow: hidden;
		}

		.error-panel {
			height: 100%;
			border-radius: 8px;
			overflow: hidden;
			display: flex;
			flex-direction: column;
		}
	</style>
</head>

<body>
	<nav class="navbar has-shadow is-fixed-top" role="navigation" aria-label="main navigation">
		<div class="navbar-brand">
			<span class="navbar-item has-text-weight-semibold">
				Flowbench
			</span>
		</div>

		<div class="navbar-menu">
			<div class="navbar-start">
				<div class="navbar-item">
					<div class="buttons">
						<button id="btn-new" class="button is-small" onclick="fileNew()">
							<span class="icon"><i class="fas fa-file"></i></span>
							<span>New</span>
						</button>
						<button id="btn-open" class="button is-small" onclick="fileOpen()">
							<span class="icon"><i class="fas fa-folder-open"></i></span>
							<span>Open</span>
						</button>
						<button id="btn-save" class="button is-small " onclick="fileSave(false)">
							<span class="icon"><i class="fas fa-save"></i></span>
							<span>Save</span>
						</button>
						<button id="btn-saveas" class="button is-small " onclick="fileSave(true)">
							<span class="icon"><i class="fas fa-save"></i></span>
							<span>Save As</span>
						</button>
					</div>
				</div>
			</div>

			<div class="navbar-end">
				<span class="navbar-item" id="current-filename">template.json</span>
			</div>
		</div>
	</nav>

	<div class="main-content">
		<div class="editor-wrapper">
			<div class="split-container">

				<div class="monaco-part">
					<div class="box p-0" style="flex: 1; overflow: hidden;">
						<div id="editor"></div>
					</div>
				</div>

				<div class="panel-part">
					<div class="box error-panel p-0">
						<header class="px-4 py-3 has-background-grey-dark has-text-white">
							<strong>Errors / Console</strong>
						</header>
						<div class="p-4"
							style="flex: 1; overflow-y: auto; background: #1e1e1e; color: #ddd; font-family: monospace;">
							<div class="has-text-danger mb-2">
								<i class="fas fa-times-circle"></i>
								<strong>Line 12:</strong> Unexpected token
							</div>
							<div class="mb-2">
								<i class="fas fa-info-circle"></i>
								No issues in current file
							</div>
						</div>
					</div>
				</div>

			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs/loader.js"></script>
	<script src="editor-script.js"></script>
</body>

</html>
